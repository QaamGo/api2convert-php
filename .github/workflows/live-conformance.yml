name: live-conformance

# Runs the live conformance suite against the real API2Convert API whenever a new
# version is tagged (or on demand). The API key is an encrypted repository secret,
# never exposed to fork pull requests.
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
      - run: composer install --no-interaction --no-progress
      - name: Live conformance
        run: vendor/bin/phpunit --testsuite live
        env:
          API2CONVERT_API_KEY: ${{ secrets.API2CONVERT_API_KEY }}
