# CI for the API2Convert PHP SDK.
# Lints, statically analyses and tests on every push/MR. Produces a pipeline
# status badge, a coverage badge, and a JUnit test report (the "Tests" tab in
# merge requests). The live conformance suite runs only when API2CONVERT_API_KEY
# is set as a (protected) CI variable.

stages:
  - test

default:
  image: php:8.2-cli
  before_script:
    - apt-get update -qq && apt-get install -y -qq git unzip libzip-dev > /dev/null
    - docker-php-ext-install zip > /dev/null
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
    - composer install --no-interaction --no-progress

cs:
  stage: test
  script:
    - vendor/bin/phpcs

stan:
  stage: test
  script:
    - vendor/bin/phpstan analyse --no-progress

# Unit tests with code coverage + a JUnit report.
# GitLab reads the percentage from the `coverage:` regex (→ coverage badge),
# the JUnit XML (→ Tests tab) and the Cobertura XML (→ MR diff coverage).
unit:
  stage: test
  script:
    - apt-get install -y -qq $PHPIZE_DEPS > /dev/null
    - pecl install pcov > /dev/null && docker-php-ext-enable pcov
    - vendor/bin/phpunit --testsuite unit --coverage-text --colors=never
        --coverage-cobertura coverage.cobertura.xml --log-junit junit.xml
  coverage: '/^\s*Lines:\s*\d+\.\d+%/'
  artifacts:
    when: always
    expire_in: 1 week
    reports:
      junit: junit.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.cobertura.xml

# Make sure it builds and tests cleanly on the newer PHP versions too.
unit:php83:
  stage: test
  image: php:8.3-cli
  script:
    - vendor/bin/phpunit --testsuite unit

unit:php84:
  stage: test
  image: php:8.4-cli
  script:
    - vendor/bin/phpunit --testsuite unit

# Runs only when API2CONVERT_API_KEY is provided (protected variable).
live:
  stage: test
  script:
    - vendor/bin/phpunit --testsuite live
  rules:
    - if: '$API2CONVERT_API_KEY'
  allow_failure: true
